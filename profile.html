<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بروفايلي | Sports Medicine Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --bg-deep:#f9fafb; --bg-surface:#0A2540; --bg-surface-2:#112D4E; --gold-main:#f07f3d; --gold-light:#E5C585; --gold-pale:#e3ebfd; --cream:#1a4065; --cream-dim:#64748B; --line:rgba(10,37,64,0.08); --font-display:'Cairo', sans-serif; --font-body:'Tajawal', sans-serif; }
  *{margin:0;padding:0;box-sizing:border-box;} body{background:var(--bg-deep);color:var(--cream);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;} a{text-decoration:none;color:inherit;} img,svg{display:block;} .wrap{max-width:1180px;margin:0 auto;padding:0 32px;}
  
  header{background:#fff;border-bottom:1px solid var(--line);padding:15px 0;position:sticky;top:0;z-index:100;}
  nav{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:12px;font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--bg-surface);}
  .logo img{height:40px;width:auto;}
  .back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg-surface);color:#fff;border-radius:8px;font-family:var(--font-display);font-weight:700;font-size:14px;transition:0.3s;}
  .back-btn:hover{background:var(--gold-main);transform:translateX(-5px);}

  .profile-container{padding:60px 0;flex-grow:1;}
  .profile-grid{display:grid;grid-template-columns:300px 1fr;gap:40px;}
  
  .profile-card{background:#fff;border-radius:20px;padding:40px 30px;text-align:center;box-shadow:0 10px 30px rgba(10,37,64,0.04);border:1px solid var(--line);position:sticky;top:90px;}
  .avatar-wrapper{width:120px;height:120px;margin:0 auto 20px;border-radius:50%;overflow:hidden;border:4px solid var(--gold-light);background:var(--bg-deep);display:flex;align-items:center;justify-content:center;}
  .avatar-wrapper img{width:100%;height:100%;object-fit:cover;}
  .avatar-initials{font-family:var(--font-display);font-size:40px;font-weight:800;color:var(--gold-main);}
  .student-name{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--bg-surface);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;}
  
  .verified-badge-img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
  
  .student-email{font-size:14px;color:var(--cream-dim);margin-bottom:10px;word-break:break-all;}
  
  /* تنسيق بادج الكورس الحالي */
  .course-badge {
    display:inline-block; 
    padding:6px 16px; 
    background:var(--gold-pale); 
    color:var(--gold-main); 
    border-radius:100px; 
    font-size:13px; 
    font-weight:700; 
    margin-bottom:15px; 
    border:1px solid rgba(240,127,61,0.2);
    font-family: var(--font-display);
  }

  .status-badge{display:inline-block;padding:6px 16px;background:#dcfce7;color:#16a34a;border-radius:100px;font-size:13px;font-weight:700;}

  .share-btn {
    margin-top: 20px; width: 100%; padding: 12px; background: var(--bg-surface); color: #fff; border: none; border-radius: 8px; font-family: var(--font-display); font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .share-btn:hover { background: var(--gold-main); }

  .qr-modal { position: fixed; inset: 0; background: rgba(10,37,64,0.9); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; }
  .qr-modal.active { display: flex; }
  .qr-content { background: #fff; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; position: relative; }
  .close-qr { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--cream-dim); }
  #qrcode { margin: 20px auto; display: flex; justify-content: center; }
  #qrcode img { border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  .download-qr-btn { margin-top: 15px; padding: 10px 20px; background: var(--gold-main); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font-display); font-weight: 700; }

  .content-section h2{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--bg-surface);margin-bottom:25px;display:flex;align-items:center;gap:10px;}
  .cert-list{display:grid;gap:20px;}
  
  .cert-item{
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:25px;display:flex;justify-content:space-between;align-items:center;
    transition:0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.02);
  }
  .cert-item:hover{border-color:var(--gold-main);transform:translateY(-3px);box-shadow:0 10px 25px rgba(240,127,61,0.1);}
  
  .cert-info h3{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--bg-surface);margin-bottom:8px;}
  .cert-meta{display:flex;gap:20px;font-size:13px;color:var(--cream-dim);flex-wrap:wrap;}
  .cert-meta span{display:flex;align-items:center;gap:5px;}
  
  .download-btn{
    padding:10px 20px;background:var(--bg-surface);color:#fff;border-radius:8px;
    font-family:var(--font-display);font-weight:700;font-size:13px;transition:0.3s;
    display:inline-flex;align-items:center;gap:8px;white-space:nowrap; border: none; cursor: pointer;
  }
  .download-btn:hover{background:var(--gold-main);}

  .empty-state{text-align:center;padding:60px 20px;background:#fff;border-radius:16px;border:1px dashed var(--line);color:var(--cream-dim);}

  @media(max-width:900px){ .profile-grid{grid-template-columns:1fr;} .profile-card{position:static;} }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <nav>
      <div class="logo">
        <img src="1.jpg" alt="SMA Logo">
        <span style="font-size:16px;line-height:1.2;">SPORTS MEDICINE<br><span style="color:var(--gold-main);font-size:12px;">ACADEMY</span></span>
      </div>
      <a href="home.html" class="back-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        العودة للرئيسية
      </a>
    </nav>
  </div>
</header>

<main class="profile-container">
  <div class="wrap">
    <div class="profile-grid">
      
      <aside class="profile-card">
        <div class="avatar-wrapper" id="avatarWrapper">
          <div class="avatar-initials">--</div>
        </div>
        <h1 class="student-name" id="profileName">جاري التحميل...</h1>
        
        <!-- مكان عرض الإيميل والكورس الحالي -->
        <p class="student-email" id="profileEmail">--</p>
        <!-- سيتم إضافة بادج الكورس هنا ديناميكياً عبر الجافاسكريبت -->
        
        <span class="status-badge">✅ حساب مفعل</span>
        
        <button class="share-btn" onclick="openQRModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
          مشاركة البروفايل
        </button>
      </aside>

      <section class="content-section">
        <h2>
          <svg width="24" height="24" fill="none" stroke="var(--gold-main)" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          شهاداتي المعتمدة
        </h2>
        <div id="certificatesList" class="cert-list">
          <div class="empty-state">جاري جلب بيانات الشهادات من النظام...</div>
        </div>
      </section>

    </div>
  </div>
</main>

<div class="qr-modal" id="qrModal">
  <div class="qr-content">
    <button class="close-qr" onclick="closeQRModal()">×</button>
    <h3 style="font-family:var(--font-display);color:var(--bg-surface);margin-bottom:10px;">امسح الكود للوصول لبروفايلي</h3>
    <div id="qrcode"></div>
    <button class="download-qr-btn" onclick="downloadQR()">📥 تحميل الصورة</button>
  </div>
</div>

<script>
  // ==========================================
  // إعدادات السيرفر والبيانات
  // ==========================================
  const API_BASE = "https://ee2bd2e9-d27b-4a2b-b2b4-2a31f2a3ad2d-00-1419440viwhxz.janeway.replit.dev";
  const activeEmail = localStorage.getItem('active_student_email');
  let studentProfileUrl = '';

  // دالة مساعدة لبناء الروابط الكاملة للصور والملفات
  function buildFullUrl(path) {
    if (!path) return null;
    if (path.startsWith('http')) return path;
    
    // تنظيف المسارات الداخلية للسيرفر
    let cleanPath = path;
    if (path.includes('/home/runner/') || path.includes('__mockup') || path.includes('workspace')) {
        const fileName = path.split('/').pop(); 
        cleanPath = `/uploads/${fileName}`;
    }
    
    return `${API_BASE}${cleanPath.startsWith('/') ? '' : '/'}${cleanPath}`;
  }

  // ✅ دالة التحميل المباشر (نفس مبدأ Streamlit - Blob Fetch)
  async function downloadCert(url, filename) {
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network response was not ok');
        
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `${filename}.pdf`; 
        document.body.appendChild(a);
        a.click();
        
        // تنظيف الذاكرة بعد التحميل
        window.URL.revokeObjectURL(blobUrl);
        document.body.removeChild(a);
    } catch (error) {
        console.error('Download failed:', error);
        alert('حدث خطأ أثناء التحميل. تأكد من اتصالك بالإنترنت.');
    }
  }

  if(!activeEmail) {
    window.location.href = 'pending.html';
  } else {
    fetch(`${API_BASE}/api/db`)
      .then(res => res.json())
      .then(data => {
        const students = data.students || [];
        const student = students.find(s => s.email === activeEmail);
        
        if (!student || student.status !== 'approved') {
          localStorage.removeItem('active_student_email');
          window.location.href = 'pending.html';
          return;
        }

        // ✅ تعبئة البيانات الأساسية وعلامة التوثيق
        const isVerified = student.is_verified === true;
        const verifiedIcon = isVerified 
          ? '<img src="6.png" class="verified-badge-img" alt="موثق" title="حساب موثق">' 
          : '';
        
        document.getElementById('profileName').innerHTML = `${student.firstName} ${student.lastName} ${verifiedIcon}`;
        document.getElementById('profileEmail').textContent = student.email;

        // ✅ عرض المسار التدريبي الحالي (لو موجود ومحدد من الأدمن)
        if (student.currentCourse && student.currentCourse.trim() !== "") {
            const courseBadge = document.createElement('div');
            courseBadge.className = 'course-badge';
            courseBadge.innerHTML = `📚 ${student.currentCourse}`;
            // إدراج البادج بعد الإيميل مباشرة
            document.getElementById('profileEmail').after(courseBadge);
        }
        
        // ✅ عرض صورة البروفايل (حل شامل لجميع أنظمة الرفع)
        const avatarWrapper = document.getElementById('avatarWrapper');
        const initials = (student.firstName.charAt(0) + student.lastName.charAt(0)).toUpperCase();
        
        let profileImgPath = null;
        const possibleKeys = ['imagePath', 'url', 'profile_image', 'avatar', 'profileImage', 'avatarUrl', 'photo'];
        for (const key of possibleKeys) {
            if (student[key] && typeof student[key] === 'string') {
                profileImgPath = student[key];
                break;
            }
        }

        const fullAvatarUrl = buildFullUrl(profileImgPath);

        if (fullAvatarUrl) {
            avatarWrapper.innerHTML = `<img src="${fullAvatarUrl}" alt="صورة البروفايل" onerror="this.parentElement.innerHTML='<div class=\\'avatar-initials\\'>${initials}</div>'">`;
        } else {
            avatarWrapper.innerHTML = `<div class="avatar-initials">${initials}</div>`;
        }

        studentProfileUrl = `${window.location.origin}/public-profile.html?email=${encodeURIComponent(student.email)}`;
        renderCertificates(student.email, data.certificates || []);
      })
      .catch(err => {
        console.error('Connection Error:', err);
        document.getElementById('certificatesList').innerHTML = 
          `<div class="empty-state" style="color:#dc2626">⚠️ تعذر الاتصال بالسيرفر</div>`;
      });
  }

  // ✅ دالة عرض الشهادات المعدلة (معاينة + تحميل مباشر)
  function renderCertificates(email, certs) {
    const container = document.getElementById('certificatesList');
    const myCerts = certs.filter(c => c.studentEmail === email);
    
    if(myCerts.length > 0) {
      container.innerHTML = myCerts.map((cert, index) => {
        // بناء الرابط الكامل للشهادة
        const certUrl = buildFullUrl(cert.filePath);
        
        return `
        <div class="cert-item">
          <div class="cert-info">
            <h3>${cert.courseName}</h3>
            <div class="cert-meta">
              <span>
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                رقم الشهادة: ${cert.certId}
              </span>
              <span>
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                تاريخ الإصدار: ${cert.issueDate}
              </span>
            </div>
          </div>
          
          <!-- أزرار العرض والتحميل المباشر -->
          <div style="display:flex; gap:10px;">
            <a href="${certUrl}" target="_blank" class="download-btn" style="background:var(--gold-main);">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              معاينة
            </a>
            
            <!-- زر تحميل يستخدم Blob Fetch مثل Streamlit -->
            <button onclick="downloadCert('${certUrl}', '${cert.courseName}_${cert.certId}')" class="download-btn">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              تحميل
            </button>
          </div>
        </div>
        `;
      }).join('');
    } else {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 15px;opacity:0.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <p>لا توجد شهادات صادرة لك حتى الآن.<br>سيتم إضافتها هنا فور اعتمادها من الإدارة.</p>
        </div>
      `;
    }
  }

  // --- وظائف الـ QR Code ---
  function openQRModal() {
    const modal = document.getElementById('qrModal');
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: studentProfileUrl,
      width: 200, height: 200,
      colorDark : "#0A2540", colorLight : "#ffffff",
      correctLevel : QRCode.CorrectLevel.H
    });
    modal.classList.add('active');
  }

  function closeQRModal() {
    document.getElementById('qrModal').classList.remove('active');
  }

  function downloadQR() {
    const qrImg = document.querySelector('#qrcode img');
    if (qrImg) {
      const link = document.createElement('a');
      link.download = 'my-profile-qr.png';
      link.href = qrImg.src;
      link.click();
    }
  }
</script>

</body>
</html>
